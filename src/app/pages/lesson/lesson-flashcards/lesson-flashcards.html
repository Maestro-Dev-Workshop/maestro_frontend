<div class="w-full h-full flex flex-col relative items-center justify-center text-center px-8 lg:pl-12">
  <h1 class="text-4xl font-bold absolute top-12 w-full text-center">
    Test Your Knowledge
  </h1>

  <app-flashcards
    [cards]="cards()"
    [loop]="true"
    (cardChange)="onCardChange($event)"
  >

    <ng-template #front let-card>
      <h2 class="text-2xl">{{ card.front }}</h2>
    </ng-template>

    <ng-template #back let-card>
      <p class="text-lg text-green-400">{{ card.back }}</p>
    </ng-template>

  </app-flashcards>
</div>
