<div class="w-full h-full flex flex-col items-center justify-center text-center px-6 relative">

  <!-- CARD -->
  <div
    class="bg-[var(--bg-hover)] rounded-2xl p-6 w-full md:w-1/2 min-h-[220px] flex flex-col justify-between items-center"
    [@slide]="currentIndex()"
    [@flip]="flipState()"
    (@flip.done)="onFlipDone()"
  >

    <h3 class="font-semibold">
      {{ showAnswer() ? 'Answer' : 'Question' }} #{{ currentIndex() + 1 }}
    </h3>

    <div class="my-4 w-full">

      @if (showAnswer()) {

        @if (backTemplate()) {
          <ng-container
            *ngTemplateOutlet="backTemplate()!; context: { $implicit: currentCard }"
          />
        } @else {
          <p class="text-lg">{{ currentCard?.back }}</p>
        }

      } @else {

        @if (frontTemplate()) {
          <ng-container
            *ngTemplateOutlet="frontTemplate()!; context: { $implicit: currentCard }"
          />
        } @else {
          <p class="text-2xl font-medium">{{ currentCard?.front }}</p>
        }

      }

    </div>

    <button class="text-sm lg:hover:underline" (click)="toggleAnswer()">
      Flip Card
    </button>
  </div>

  <!-- CONTROLS -->
  <div class="flex flex-row w-full md:w-1/2 items-center justify-between mt-4">

    <!-- PREV -->
    <button
      (click)="previousCard()"
      [disabled]="isFirst && !loop()"
      [class.invisible]="isFirst && !loop()"
      class="flex items-center rounded-full bg-[var(--bg-hover)] px-4 py-2 lg:hover:underline"
    >
      <app-theme-icon name="dropdown-icon" class="w-2 mr-2 rotate-180"/>
      Previous
    </button>

    <!-- HINT -->
    @if (enableHint()) {
      <div class="flex flex-col items-center w-[60%]">

        <button class="text-xs lg:hover:underline" (click)="toggleHint()">
          {{ showHint() ? 'Hide Hint' : 'Show Hint' }}
        </button>

        <div
          class="text-xs mt-2 transition-all duration-200"
          [class.opacity-0]="!showHint()"
          [class.translate-y-1]="!showHint()"
          [class.opacity-100]="showHint()"
          [class.translate-y-0]="showHint()"
        >
          {{ currentCard?.hint }}
        </div>

      </div>
    }

    <!-- NEXT -->
    <button
      (click)="nextCard()"
      [disabled]="isLast && !loop()"
      [class.invisible]="isLast && !loop()"
      class="flex items-center rounded-full bg-[var(--bg-hover)] px-4 py-2 lg:hover:underline"
    >
      Next
      <app-theme-icon name="dropdown-icon" class="w-2 ml-2"/>
    </button>

  </div>
</div>
